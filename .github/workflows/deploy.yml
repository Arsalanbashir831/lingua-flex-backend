name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

# Prevent multiple concurrent deployments running at the same time.
# If a new push happens while a deploy is running, the older deploy is cancelled.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout code (needed so CI knows context)
      # ─────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Set up SSH agent with the deploy key
      # ─────────────────────────────────────────────
      - name: 🔐 Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ─────────────────────────────────────────────
      # 3. Add VPS host to known_hosts (prevents
      #    interactive host-authenticity prompt)
      # ─────────────────────────────────────────────
      - name: 🌐 Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ─────────────────────────────────────────────
      # 4. Run the full deployment sequence on VPS
      #    Each command is fail-fast: if any step
      #    fails, the sequence aborts and the live
      #    server keeps running on the old code.
      # ─────────────────────────────────────────────
      - name: 🏗️ Pull latest code on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail
             cd ${{ secrets.VPS_APP_DIR }}
             echo '--- Pulling latest code ---'
             git fetch origin main
             git reset --hard origin/main
             echo '✅ Code updated to: '\$(git log -1 --oneline)"

      - name: 📦 Sync Python dependencies (uv)
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail
             export PATH="\$HOME/.local/bin:\$HOME/.cargo/bin:\$PATH"
             cd ${{ secrets.VPS_APP_DIR }}
             echo '--- Syncing dependencies via uv ---'
             uv sync --frozen
             echo '✅ Dependencies synced'"

      - name: 🗄️ Apply database migrations
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail
             export PATH="\$HOME/.local/bin:\$HOME/.cargo/bin:\$PATH"
             cd ${{ secrets.VPS_APP_DIR }}
             echo '--- Running database migrations ---'
             uv run python manage.py migrate --noinput
             echo '✅ Migrations applied'"

      - name: 📁 Collect static files
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail
             export PATH="\$HOME/.local/bin:\$HOME/.cargo/bin:\$PATH"
             cd ${{ secrets.VPS_APP_DIR }}
             echo '--- Collecting static files ---'
             uv run python manage.py collectstatic --noinput
             echo '✅ Static files collected'"

      # ─────────────────────────────────────────────
      # 5. Restart services (only reached if ALL
      #    pre-flight steps above succeeded)
      # ─────────────────────────────────────────────
      - name: ♻️ Restart application services
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail
             echo '--- Restarting gunicorn (Django) ---'
             sudo systemctl restart gunicorn
             echo '--- Restarting fastapi-chat (FastAPI) ---'
             sudo systemctl restart fastapi-chat
             echo '✅ Services restarted'"

      # ─────────────────────────────────────────────
      # 6. Health check — poll for up to 30 seconds
      #    to verify the server came back online.
      #    Requires PRODUCTION_URL variable set in the
      #    GitHub Environment (e.g. https://api.example.com)
      # ─────────────────────────────────────────────
      - name: 🩺 Health check
        run: |
          HEALTH_URL="${{ vars.PRODUCTION_URL }}/api/health/"
          echo "Polling health endpoint: $HEALTH_URL"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed after 30 seconds — server may not be responding"
          exit 1
        continue-on-error: true   # Don't fail the whole workflow if health endpoint doesn't exist yet

      # ─────────────────────────────────────────────
      # 7. Write a deployment summary visible in
      #    the GitHub Actions UI
      # ─────────────────────────────────────────────
      - name: 📋 Write deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
