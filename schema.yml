      operationId: api_astrology_birth_profile_retrieve
      description: |-
        GET  — Retrieve the authenticated user's birth profile
        POST — Create (fails if already exists; use PUT to update)
        PUT  — Update existing birth profile (also clears cached charts so they
               are recalculated on the next natal-chart request)
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_astrology_birth_profile_create
      description: |-
        GET  — Retrieve the authenticated user's birth profile
        POST — Create (fails if already exists; use PUT to update)
        PUT  — Update existing birth profile (also clears cached charts so they
               are recalculated on the next natal-chart request)
      tags:
      - api
      responses:
        '200':
          description: No response body
    put:
      operationId: api_astrology_birth_profile_update
      description: |-
        GET  — Retrieve the authenticated user's birth profile
        POST — Create (fails if already exists; use PUT to update)
        PUT  — Update existing birth profile (also clears cached charts so they
               are recalculated on the next natal-chart request)
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/astrology/natal-chart/:
    get:
      operationId: api_astrology_natal_chart_retrieve
      description: |-
        GET — Returns combined D1 + D9 chart data plus full planet details.

        Data is computed once (on first request) and cached permanently in
        NatalChartCache. Subsequent calls are DB-only (no external API hit).
        timezone_str is backfilled from the API response on first call.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/astrology/transits/:
    get:
      operationId: api_astrology_transits_retrieve
      description: |-
        GET — Returns today's planetary transits relative to the natal Moon.

        Cache invalidation strategy (no cron):
          - On each request, compare cached_for_date with today in the user's
            local timezone (stored in BirthProfile.timezone_str).
          - If the dates differ → call the API and refresh the cache.
          - If timezone_str is not yet set (natal chart not fetched) → fall back to UTC.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/auth/google/callback/:
    post:
      operationId: api_auth_google_callback_create
      description: |-
        Handle Google OAuth callback and create/login user

        POST /api/auth/google/callback/
        {
            "access_token": "supabase_access_token",
            "refresh_token": "supabase_refresh_token",
            "role": "STUDENT" | "TEACHER"  # optional - only needed for new user registration
        }
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/google/complete-profile/:
    post:
      operationId: api_auth_google_complete_profile_create
      description: |-
        Complete profile setup for OAuth users - matches RegisterWithProfileView schema

        POST /api/auth/google/complete-profile/
        {
            // Common fields
            "phone_number": "+1234567890",
            "gender": "Male",
            "date_of_birth": "1990-01-01",

            // UserProfile (accounts model) fields
            "bio": "I love languages",
            "city": "New York",
            "country": "USA",
            "postal_code": "10001",
            "native_language": "English",
            "learning_language": "Spanish",

            // Teacher-specific fields (if role is TEACHER)
            "qualification": "TESOL Certified",
            "experience_years": 5,
            "certificates": ["cert1.pdf", "cert2.pdf"],
            "about": "Experienced teacher with 5 years...",
            "teaching_experience": 5,
            "teaching_languages": ["English", "Spanish"],
            "hourly_rate": 30.00,

            // Student-specific fields (if role is STUDENT)
            "learning_goals": "Improve conversational skills",
            "proficiency_level": "INTERMEDIATE",
            "target_languages": ["Spanish", "French"]
        }
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/auth/google/initiate/:
    post:
      operationId: api_auth_google_initiate_create
      description: |-
        Initiate Google OAuth flow with optional role selection

        POST /api/auth/google/initiate/
        {
            "role": "STUDENT" | "TEACHER",  # optional - required for new users, optional for existing users
            "redirect_url": "https://yourfrontend.com/auth/callback"  # optional
        }
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
