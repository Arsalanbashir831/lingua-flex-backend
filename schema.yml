        name: id
        schema:
          type: integer
        description: A unique integer value identifying this gig.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Gig'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Gig'
          multipart/form-data:
            schema:
