          type: string
          description: Sender name (defaults to teacher's name)
          maxLength: 100
        from_email:
          type: string
          format: email
          description: Sender email (defaults to teacher's email)
          maxLength: 254
        notes:
          type: string
          description: Internal notes about this campaign
      required:
      - content
      - subject
      - title
    CampaignDetail:
      type: object
      description: Serializer for detailed campaign view
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          description: Campaign title for reference
          maxLength: 200
        subject:
          type: string
          description: Email subject line
          maxLength: 255
        content:
          type: string
          description: Full custom email message content
        status:
          allOf:
          - $ref: '#/components/schemas/StatusCffEnum'
          description: |-
            Current status of the campaign

            * `draft` - Draft
            * `sending` - Sending
            * `sent` - Sent
            * `failed` - Failed
        total_recipients:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Total number of students this campaign was sent to
        from_name:
          type: string
          description: Sender name (defaults to teacher's name)
          maxLength: 100
        from_email:
          type: string
          format: email
          description: Sender email (defaults to teacher's email)
          maxLength: 254
        teacher_name:
          type: string
          readOnly: true
        teacher_email:
          type: string
          format: email
          readOnly: true
        recipients_count:
          type: string
          readOnly: true
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/CampaignRecipient'
          readOnly: true
        notes:
          type: string
          description: Internal notes about this campaign
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the campaign was actually sent
      required:
      - content
      - created_at
      - id
      - recipients
      - recipients_count
      - sent_at
      - subject
      - teacher_email
      - teacher_name
      - title
      - updated_at
