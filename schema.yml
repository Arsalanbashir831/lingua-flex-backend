openapi: 3.0.3
info:
  title: LinguaFlex API
  version: 1.0.0
  description: Backend API for the LinguaFlex language tutoring platform.
paths:
  /api/accounts/become-student/:
    post:
      operationId: api_accounts_become_student_create
      description: Create a student record for the authenticated user if one does
        not exist.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/accounts/become-teacher/:
    post:
      operationId: api_accounts_become_teacher_create
      description: Create a teacher profile for the authenticated user if one does
        not exist.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/accounts/chats/:
    get:
      operationId: api_accounts_chats_list
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
          description: ''
    post:
      operationId: api_accounts_chats_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Chat'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Chat'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Chat'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
  /api/accounts/chats/{id}/:
    get:
      operationId: api_accounts_chats_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this chat.
        required: true
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
    put:
      operationId: api_accounts_chats_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this chat.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Chat'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Chat'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Chat'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
    patch:
      operationId: api_accounts_chats_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this chat.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChat'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChat'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedChat'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
    delete:
      operationId: api_accounts_chats_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this chat.
        required: true
      tags:
      - api
      responses:
        '204':
          description: No response body
